services:
  # 1. FastAPI Python Backend Web Service
  - type: web
    name: casepilot-backend
    env: python
    region: oregon # Render default region
    plan: free # Deploys on the Free tier
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: CasePilot AI Backend
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        value: "PASTE_YOUR_GROQ_API_KEY_HERE" # User will replace this in Render dashboard
      - key: LLM_TIMEOUT_SECONDS
        value: "120"

  # 2. React + Vite Static Frontend Website
  - type: static
    name: casepilot-frontend
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: casepilot-backend
          property: url
